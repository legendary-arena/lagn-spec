{{- $page := .page -}}
<section class="related">
  <h2>Related</h2>
  <ul class="related-list">
    {{- range .items -}}
      {{- $slug := strings.TrimSuffix ".md" . -}}
      {{- $href := printf "/%s/" (lower $slug) -}}
      {{- $label := $slug -}}
      {{- with $page.GetPage $slug -}}
        {{- $label = .Title -}}
      {{- end -}}
      <li><a href="{{ $href | safeURL }}">{{ $label }}</a></li>
    {{- end -}}
  </ul>
</section>
