# Legendary Arena — Render.com Infrastructure
# Run: render deploy  (or commit to main — Render auto-deploys)

services:
  # Game server — boardgame.io authoritative WebSocket server
  - type: web
    name: legendary-arena-server
    runtime: node
    # why: Running migrate in buildCommand (not startCommand) means migrations
    # complete once per deploy, not once per server restart. On Render, a server
    # can restart multiple times during a deploy. If migrate ran in startCommand,
    # concurrent restarts could race to apply the same migration. BuildCommand
    # runs exactly once, sequentially, before any instance starts.
    #
    # No --env-file flag: Render injects envVars into the process environment
    # directly. There is no .env file in the build environment.
    #
    # why: --import points at tsx's loader.mjs because apps/server/src
    # contains TypeScript files (db/database.ts + auth/ + leaderboards/ +
    # profile/ + teams/ .logic.ts / .types.ts / .routes.ts modules)
    # imported via the canonical .js-extension ESM convention. Without a
    # TS loader Node fails at startup with ERR_MODULE_NOT_FOUND for
    # db/database.js. tsx is a devDep of apps/server and is installed by
    # the buildCommand's `pnpm install`. The relative path
    # ./apps/server/node_modules/tsx/dist/loader.mjs resolves from the
    # service's repo-root cwd; bare `tsx` would not (pnpm hoists it
    # under apps/server/node_modules per strict hoisting policy).
    buildCommand: pnpm install && pnpm -r build && node scripts/migrate.mjs
    startCommand: node --import ./apps/server/node_modules/tsx/dist/loader.mjs apps/server/src/index.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # why: pin Node major version so Render does not silently upgrade.
      # The project requires Node >=22 (apps/server/package.json engines).
      # Render's blueprint schema does not accept a `nodeVersion` service
      # field; NODE_VERSION envVar is the documented pin mechanism.
      - key: NODE_VERSION
        value: "22"
      - key: DATABASE_URL
        fromDatabase:
          name: legendary-arena-db
          property: connectionString
      # JWT_SECRET must be set manually in the Render dashboard.
      # Generate with:
      # node --input-type=module -e "import { randomBytes } from 'node:crypto'; console.log(randomBytes(32).toString('hex'))"
      - key: JWT_SECRET
        sync: false
      # Hanko session-verifier configuration (WP-126 / D-12602).
      # HANKO_TENANT_BASE_URL is the tenant-scoped origin (Hanko Cloud's
      # documented /{tenant_id}/.well-known/jwks.json endpoint shape —
      # e.g., https://passkeys.hanko.io/<tenant_id>); the verifier
      # appends /.well-known/jwks.json programmatically.
      - key: HANKO_TENANT_BASE_URL
        sync: false
      # HANKO_EXPECTED_AUDIENCE is the audience identifier configured in
      # the Hanko tenant; the verifier matches this against the JWT
      # `aud` claim.
      - key: HANKO_EXPECTED_AUDIENCE
        sync: false
      # HANKO_JWKS_REFRESH_INTERVAL_MS is optional; absence yields the
      # D-12603 default of 300_000 ms (5 minutes).
      - key: HANKO_JWKS_REFRESH_INTERVAL_MS
        sync: false
      # Stripe billing configuration (WP-133 / D-13301..D-13309). Production
      # startup is fatal-on-missing-env per D-13301; provision all four in the
      # Render dashboard before deploying. STRIPE_SECRET_KEY pairs with the
      # apiVersion pin '2025-09-30.clover' locked under D-13303.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # STRIPE_PRICE_ALLOWLIST is comma-separated priceId:entitlementKey pairs
      # parsed at startup into a ReadonlyMap<string, EntitlementKey>. Every
      # entitlementKey is validated against ENTITLEMENT_KEYS at startup
      # (D-13305 startup-fatal allowlist).
      - key: STRIPE_PRICE_ALLOWLIST
        sync: false
      # PUBLIC_BASE_URL is the deployed application origin (no trailing slash);
      # used to server-derive Stripe Checkout success_url and cancel_url per
      # D-13309 — accepting either from request input would permit redirect
      # manipulation.
      - key: PUBLIC_BASE_URL
        sync: false
      # Analytics user-id hashing salt (WP-205 / D-20502). The salt is the
      # high-entropy secret string mixed into the SHA-256 user_id hash in
      # apps/server/src/analytics/userIdHash.ts so the raw user_id never
      # reaches legendary.analytics_events in cleartext. Production startup
      # fails loudly when this env var is unset or empty per the locked
      # error text:
      #   "ANALYTICS_USER_ID_SALT is unset; refusing to start. Set the env
      #    var to a high-entropy secret string in the deployment environment."
      # Generate with:
      # node --input-type=module -e "import { randomBytes } from 'node:crypto'; console.log(randomBytes(32).toString('hex'))"
      # Salt rotation is out of scope for v1 (D-20502) — rotating the salt
      # invalidates every existing user_id_hash linkage; treat as a one-time
      # provisioning step until a future WP designs a rotation strategy.
      - key: ANALYTICS_USER_ID_SALT
        sync: false
      # Sweep submission shared-secret token (WP-209 / D-20702). The token
      # gates `POST /api/sweep/runs`; `X-Sweep-Token` request header must
      # byte-equal this value via `node:crypto.timingSafeEqual` (preceded by
      # a `Buffer.byteLength` length-equality precheck — Node's
      # `timingSafeEqual` throws RangeError on unequal-length buffers).
      # Production startup fails loudly when this env var is unset or empty
      # per the locked error text:
      #   "SWEEP_SUBMIT_TOKEN is unset; refusing to start. Set the env var
      #    to a high-entropy secret string in the deployment environment."
      # Generate with:
      # node --input-type=module -e "import { randomBytes } from 'node:crypto'; console.log(randomBytes(32).toString('hex'))"
      # The same value must be set as the `SWEEP_SUBMIT_TOKEN` GitHub Actions
      # secret so the nightly sweep workflow can authenticate to this endpoint.
      - key: SWEEP_SUBMIT_TOKEN
        sync: false
      # Legends Snapshot Publisher (WP-142 / D-14201..D-14207).
      # R2 credentials for the S3-compatible API. sync: false because
      # these are secrets provisioned manually in the Render dashboard.
      - key: R2_LEGENDS_BUCKET
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      # why: kill switch per D-14202 — default "false" so test/dev/staging
      # runs do not write to prod R2. Set to "true" in the production
      # Render dashboard to enable the publisher.
      - key: LEGENDS_PUBLISHER_ENABLED
        value: "false"
      # why: cadence override per D-14201. Default 300000 (5 min).
      # Override only for debugging or burst-catch-up scenarios.
      - key: LEGENDS_PUBLISHER_INTERVAL_MS
        value: "300000"

  # Engineering Wiki — Hugo-built read-only projection of wiki/.
  # why: Static-site posture per WP-139 / D-13811. Builds the wiki content
  # projection + link integrity + Hugo render at deploy time. Layer-boundary
  # clean — does not import or run any engine/registry/server code; the
  # buildCommand only touches apps/wiki-viewer/ and wiki/. Hugo version
  # is pinned in apps/wiki-viewer/.hugo-version (D-13808 + Open Decision C).
  - type: web
    name: legendary-arena-wiki
    runtime: static
    buildCommand: |
      curl -sL "https://github.com/gohugoio/hugo/releases/download/v$(cat apps/wiki-viewer/.hugo-version)/hugo_extended_$(cat apps/wiki-viewer/.hugo-version)_linux-amd64.tar.gz" | tar -xz hugo
      ./hugo version
      pnpm install --filter . --frozen-lockfile=false
      node apps/wiki-viewer/scripts/project-wiki.mjs
      node apps/wiki-viewer/scripts/check-links.mjs
      ./hugo --source apps/wiki-viewer --minify
    staticPublishPath: apps/wiki-viewer/public
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "22"

databases:
  # Managed PostgreSQL — rules engine backing store
  - name: legendary-arena-db
    # why: basic_256mb is sufficient for <100 concurrent games at launch.
    # The rules cache is loaded at startup; ongoing DB queries are minimal.
    # (Replaces the deprecated 'starter' plan key — see Render's plan rename.)
    plan: basic-256mb
