name: CI → Build → Deploy

on:
  # why: two separate `push:` keys in one mapping silently collide —
  # YAML keeps only the last, so non-tag pushes to main were skipping
  # CI entirely. Merged into a single `push:` with both branches and
  # tags. Publishing to npm + uploading to R2 remains gated by the
  # `if: startsWith(github.ref, 'refs/tags/v')` on those jobs.
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Validate card data ───────────────────────────────────────────────────
  validate:
    name: Validate Registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run registry validation
        run: pnpm registry:validate

      - uses: actions/upload-artifact@v4
        with:
          name: registry-health
          path: packages/registry/dist/registry-health.json

  # ── 2. Build dist/ ─────────────────────────────────────────────────────────
  build:
    name: Build Registry Dist
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Build TypeScript types
        run: pnpm registry:build

      - uses: actions/upload-artifact@v4
        with:
          name: registry-dist
          path: packages/registry/dist/

  # ── 3. Build viewer ────────────────────────────────────────────────────────
  build-viewer:
    name: Build Registry Viewer
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Download registry dist
        uses: actions/download-artifact@v4
        with: { name: registry-dist, path: packages/registry/dist }

      # why: registry-viewer imports @legendary-arena/lagn (WP-245 loadout
      # export), whose package "types" resolve to dist/*.d.ts. lagn's dist is
      # gitignored and this job only downloads the registry dist artifact, so
      # without an explicit build vue-tsc fails with TS2307 "Cannot find module
      # '@legendary-arena/lagn'". lagn depends only on zod (no registry dist
      # needed), so a filtered build is enough — no need for a full `pnpm -r build`.
      - name: Build lagn types
        run: pnpm --filter @legendary-arena/lagn build

      - name: Lint viewer
        run: pnpm --filter registry-viewer lint

      - name: Typecheck viewer
        run: pnpm --filter registry-viewer typecheck

      - name: Build viewer
        run: pnpm viewer:build

      - uses: actions/upload-artifact@v4
        with:
          name: viewer-dist
          path: apps/registry-viewer/dist/

  # ── 3b. Typecheck arena-client ───────────────────────────────────────────────
  # why: WP-166 — gate `vue-tsc --noEmit` on arena-client so the ~40 errors this
  # packet cleared cannot silently re-drift. Nothing else on the green path
  # type-checks the client (Vite uses esbuild; tests run under tsx; only
  # registry-viewer typecheck was gated before). Runs as its own job because
  # arena-client imports @legendary-arena/game-engine and @legendary-arena/preplan
  # whose package "types" resolve to dist/*.d.ts — those declarations must be
  # built first, and build-viewer only provides the registry dist.
  typecheck-arena-client:
    name: Typecheck Arena Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # why: builds all workspace packages in dependency order so game-engine
      # and preplan emit the dist/*.d.ts that vue-tsc resolves against.
      - name: Build workspace
        run: pnpm -r build

      - name: Typecheck arena-client
        run: pnpm --filter @legendary-arena/arena-client typecheck

  # ── 3d. Hero-effect coverage gate ────────────────────────────────────────────
  # why: WP-250 / D-24021 — gate hero-effect coverage against a committed baseline
  # so the Lever 1/2 effect-system refactor (docs/ai/DESIGN-EFFECT-AUTHORING-SCALE.md)
  # cannot silently reduce how many printed hero abilities actually execute.
  # Hybrid posture: a noEffect rise or a vanished set hard-fails; a brand-new
  # unmodeled [keyword:X] warns only. Builds the workspace first so the probe can
  # import game-engine + registry dist/.
  hero-effect-coverage:
    name: Hero Effect Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm -r build

      - name: Hero-effect coverage gate
        run: pnpm sim:coverage --check

  # ── 3c. Dashboard gates ──────────────────────────────────────────────────────
  # why: wires the apps/dashboard checks from
  # apps/dashboard/docs/code-checks-and-balances.md §11 into CI. The dashboard is
  # self-contained (no @legendary-arena/* runtime imports), so this job needs no
  # prior build artifacts and runs independently of the registry chain.
  # lint / typecheck / coverage / format / build all run as blocking gates.
  dashboard:
    name: Dashboard Gates
    runs-on: ubuntu-latest
    steps:
      # why: fetch-depth 0 gives the governance-snapshot generator full git
      # history (it reads `git log`); a shallow clone would thin the snapshot.
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # why: src/data/governance-snapshot.json is generated at build time and
      # gitignored, but useGovernanceSnapshot.ts imports it statically — so it
      # must exist before typecheck / test / build can resolve the module.
      - name: Generate governance snapshot
        run: pnpm --filter @legendary-arena/dashboard prebuild:snapshot

      - name: Lint dashboard
        run: pnpm --filter @legendary-arena/dashboard lint

      - name: Typecheck dashboard
        run: pnpm --filter @legendary-arena/dashboard typecheck

      - name: Test dashboard (coverage thresholds)
        run: pnpm --filter @legendary-arena/dashboard test:coverage

      - name: Format check dashboard
        run: pnpm --filter @legendary-arena/dashboard format:check

      - name: Build dashboard
        run: pnpm --filter @legendary-arena/dashboard build

  # ── 3e. LAGN schema drift guard ──────────────────────────────────────────────
  # why: packages/lagn-spec/schemas/lagn-v1.json is generated from the Zod source
  # (src/validator.ts → generateSchema()) and committed to the repo, but nothing on
  # the green path regenerated it. A Zod-source change without re-running the
  # generator would land a stale schema silently — only a human noticing `git
  # status` would catch it. This gate regenerates from current source and fails if
  # the committed copy drifts. lagn depends only on zod (no registry/workspace dist
  # needed), so a filtered regenerate is enough and this job runs independently of
  # the registry chain.
  lagn-schema-drift:
    name: LAGN Schema Drift Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      # why: generate:schema runs `tsc` before the generator so it imports freshly
      # compiled dist/validator.js, never a stale incremental build (the footgun
      # that produced spurious local drift before this guard existed).
      - name: Regenerate schema from Zod source
        run: pnpm --filter @legendary-arena/lagn generate:schema

      - name: Assert committed schema matches generator output
        run: |
          if ! git diff --quiet -- packages/lagn-spec/schemas/lagn-v1.json; then
            echo "::error file=packages/lagn-spec/schemas/lagn-v1.json::Committed LAGN schema is out of sync with its generator. Run 'pnpm --filter @legendary-arena/lagn generate:schema' and commit the result."
            git --no-pager diff -- packages/lagn-spec/schemas/lagn-v1.json
            exit 1
          fi
          echo "LAGN schema is in sync with generator output."

  # ── 4. Upload to R2 (tags only) ────────────────────────────────────────────
  upload-r2:
    name: Upload to Cloudflare R2
    needs: [build, build-viewer]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with: { node-version: 22, cache: pnpm }

      - run: pnpm install --frozen-lockfile

      - name: Download registry dist
        uses: actions/download-artifact@v4
        with: { name: registry-dist, path: packages/registry/dist }

      - name: Upload data + images to R2
        run: pnpm registry:upload
        env:
          DATA_VERSION:           ${{ github.ref_name }}
          R2_ACCOUNT_ID:          ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID:       ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY:   ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME:         ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL:          ${{ secrets.R2_PUBLIC_URL }}

  # ── 5. Publish to npm (tags only) ──────────────────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: upload-r2
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Download registry dist
        uses: actions/download-artifact@v4
        with: { name: registry-dist, path: packages/registry/dist }

      - name: Publish @legendary-arena/registry
        run: pnpm publish --filter @legendary-arena/registry --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
